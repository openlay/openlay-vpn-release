services:
  olv-agent:
    build: .
    container_name: olv-agent
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    network_mode: host
    volumes:
      - wireguard-config:/etc/wireguard
      - agent-certs:/app/certs
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/openlay-vpn-release:/opt/openlay-vpn-release
      - /opt/olv-agent:/opt/olv-agent
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  wireguard-config:
  agent-certs:
